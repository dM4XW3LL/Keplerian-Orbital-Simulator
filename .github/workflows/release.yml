name: Build and Attach Release Binaries and Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            executable_name: orbit_sim_linux
            c_lib: kepler.so
          - os: macos-latest
            executable_name: orbit_sim_mac
            c_lib: kepler.dylib
          - os: windows-latest
            executable_name: orbit_sim_windows.exe
            c_lib: kepler.dll

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      # Build the C library first so PyInstaller can find it
      - name: Build C Library (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: make

      # Windows uses the GCC command
      - name: Build C Library (Windows)
        if: matrix.os == 'windows-latest'
        run: gcc -O2 -fPIC -shared -o kepler.dll kepler.c

      # Bundle the Python script and C library into one executable
      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --onefile --name=${{ matrix.executable_name }} --add-data "${{ matrix.c_lib }}:." orbit_sim.py

      # Upload BOTH the raw C library and the compiled PyInstaller executable
      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.c_lib }}
            dist/${{ matrix.executable_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
